spring:
  ai:
    ollama:
      chat:
        model: qwen3.5:0.8b
        #options:
        #  max-tokens: 1_000
      init:
        pull-model-strategy: when_missing
        max-retries: 3
    openai:
      api-key: ${OPENAI_KEY}
      chat:
        options:
          model: gpt-4.1
          max-tokens: 1_000
          temperature: 0.1
  datasource:
    url: jdbc:postgresql://localhost:5432/training
    username: admin
    password: admin
  sql:
    init:
      mode: always

logging:
  level:
    pl.training.ai.chat.advisor: DEBUG