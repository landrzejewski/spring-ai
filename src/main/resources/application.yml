spring:
  ai:
    ollama:
      embedding:
        options:
          model: bge-m3:latest
      chat:
        options:
          model: gpt-oss:20b
          temperature: 0.8
          numPredict: 16000
          topK: 15
          numCtx: 32768
      init:
        pull-model-strategy: when_missing
    vectorstore:
      pgvector:
        initialize-schema: true
  datasource:
    url: jdbc:postgresql://localhost:5432/training
    username: admin
    password: admin
